<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FYJOB Scanner</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="auth-screen" class="screen hidden">
    <div class="card center">
      <img src="icons/icon48.png" alt="FYJOB" class="brand-icon" />
      <h1>FYJOB Scanner</h1>
      <p>Login dulu di FYJOB dashboard untuk lanjut scan.</p>
      <button id="btn-login" class="btn btn-primary">Buka Login</button>
      <button id="btn-retry" class="btn">Coba Sync Lagi</button>
    </div>
  </div>

  <div id="main-screen" class="screen hidden">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon48.png" alt="FYJOB" class="brand-icon" />
        <div>
          <strong>FYJOB</strong>
          <p id="user-email-label">-</p>
        </div>
      </div>
      <div id="credit-pill" class="credit-pill"><span id="credit-count">-</span> credit</div>
    </header>

    <section class="status-wrap">
      <span class="status-dot"></span>
      <p id="status-text">Preparing...</p>
    </section>

    <section id="cv-required" class="card hidden">
      <h3>CV Required</h3>
      <p>Upload CV di dashboard dulu supaya analisis aktif.</p>
      <div class="row">
        <button id="btn-open-cv-manager" class="btn">Open CV Manager</button>
        <button id="btn-refresh-cv-status" class="btn btn-primary">Refresh Status</button>
      </div>
    </section>

    <section id="job-card" class="card hidden">
      <h3 id="job-title">-</h3>
      <p id="job-company">-</p>
      <p id="job-portal" class="muted">-</p>
      <p id="job-desc-preview" class="preview">-</p>
      <button id="btn-scan" class="btn btn-primary">Quick Match Analysis</button>
      <div id="scan-loading" class="muted hidden">Analyzing...</div>
    </section>

    <section id="results-section" class="card hidden">
      <h3>Match Result</h3>
      <div class="score"><span id="score-number">0</span>% <small id="score-label">-</small></div>
      <div id="skill-gaps" class="gaps"></div>
      <p id="insight-text" class="preview">-</p>
      <a id="btn-dashboard" class="btn" target="_blank" rel="noreferrer">Open Dashboard</a>
    </section>

    <section class="card">
      <h3>Recent Scans</h3>
      <div id="history-list" class="history"></div>
    </section>

    <button id="btn-logout" class="btn danger">Logout</button>
  </div>

  <script src="sidepanel-ui.js"></script>
  <script src="lib/api.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
